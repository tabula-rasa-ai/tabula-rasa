<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Config</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px 32px; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        h3 { font-size: 0.95rem; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 18px; }
        .field { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .field:last-child { border-bottom: none; }
        .field label { font-size: 0.85rem; }
        .field label small { color: var(--muted); font-size: 0.7rem; }
        .field input, .field select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 4px 8px; border-radius: 5px; font-size: 0.85rem; width: 110px; text-align: right; }
        .field select { width: 120px; text-align: left; }
        .field input:focus, .field select:focus { border-color: var(--accent); outline: none; }
        .field .val { font-family: monospace; font-size: 0.85rem; color: #22c55e; }
        .save-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
        button { background: var(--accent); border: none; color: white; padding: 8px 20px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 0.8rem; color: var(--muted); }
        #status.ok { color: #22c55e; } #status.err { color: #ef4444; }
        .changes { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
        .changes li { padding: 2px 0; }
    </style>
</head>
<body>
<h2>&#x2699; Model Config</h2>
<p style="font-size:0.8rem;color:var(--muted);margin-bottom:16px;">Changes saved to <code>config.py</code> and take effect on the <strong>next training run</strong>.</p>

<div id="status-line" class="save-row">
    <button id="save-btn" onclick="saveConfig()">Save Changes</button>
    <span id="status">&#x1F504; Loading...</span>
</div>

<div id="config-form"></div>

<script>
var API = window.location.protocol + '//' + window.location.hostname + ':' + window.location.port;
var origConfig = {};

function $(id) { return document.getElementById(id); }

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Config field definitions: name → {label, type, options?, step?}
var FIELDS = [
    {section: 'Architecture'},
    {name: 'd_model', label: 'Embedding Dim', type: 'number', min: 16, step: 16, unit: ''},
    {name: 'n_layers', label: 'Layers', type: 'number', min: 1, max: 24, unit: ''},
    {name: 'n_heads', label: 'Attention Heads', type: 'number', min: 1, max: 16, unit: ''},
    {name: 'd_ff', label: 'FF Hidden Dim', type: 'number', min: 64, step: 64, unit: ''},
    {name: 'max_seq_len', label: 'Max Sequence Length', type: 'number', min: 16, step: 8, unit: 'tokens'},
    {name: 'dropout', label: 'Dropout', type: 'number', min: 0, max: 0.5, step: 0.05},
    {name: 'activation', label: 'Activation', type: 'select', options: ['swiglu', 'relu', 'gelu']},
    {name: 'norm_type', label: 'Normalization', type: 'select', options: ['rmsnorm', 'layernorm']},
    {name: 'pos_encoding', label: 'Position Encoding', type: 'select', options: ['rope', 'learned', 'none']},
    {name: 'weight_init', label: 'Weight Init', type: 'select', options: ['normal', 'xavier', 'kaiming']},
    {name: 'init_std', label: 'Init Std', type: 'number', min: 0.001, max: 1, step: 0.005},

    {section: 'Training'},
    {name: 'batch_size', label: 'Batch Size', type: 'number', min: 1, max: 1024, step: 8},
    {name: 'learning_rate', label: 'Learning Rate', type: 'number', min: 1e-6, max: 1e-1, step: 1e-5},
    {name: 'weight_decay', label: 'Weight Decay', type: 'number', min: 0, max: 1, step: 0.01},
    {name: 'warmup_steps', label: 'Warmup Steps', type: 'number', min: 0, max: 10000, step: 100},
    {name: 'max_steps', label: 'Max Steps', type: 'number', min: 100, max: 200000, step: 1000},
    {name: 'optimizer', label: 'Optimizer', type: 'select', options: ['adamw', 'adam', 'sgd']},
    {name: 'lr_schedule', label: 'LR Schedule', type: 'select', options: ['cosine', 'linear', 'constant']},
    {name: 'grad_clip_norm', label: 'Grad Clip Norm', type: 'number', min: 0, max: 10, step: 0.1},
    {name: 'label_smoothing', label: 'Label Smoothing', type: 'number', min: 0, max: 1, step: 0.05},

    {section: 'Data'},
    {name: 'train_samples', label: 'Train Samples', type: 'number', min: 1000, max: 1000000, step: 10000, unit: ''},
    {name: 'eval_samples', label: 'Eval Samples', type: 'number', min: 100, max: 100000, step: 100},
    {name: 'min_digits', label: 'Min Digits', type: 'number', min: 1, max: 5, step: 1},
    {name: 'max_digits', label: 'Max Digits', type: 'number', min: 1, max: 8, step: 1},

    {section: 'Algorithm Flags'},
    {name: 'use_reversed', label: 'Reversed Digits (add/sub)', type: 'checkbox'},
    {name: 'use_loss_masking', label: 'Loss Masking', type: 'checkbox'},
    {name: 'use_hard_negative', label: 'Hard Negative Mining', type: 'checkbox'},
    {name: 'tie_embeddings', label: 'Tie Embeddings', type: 'checkbox'},
    {name: 'eval_temperature', label: 'Eval Temperature', type: 'number', min: 0, max: 2, step: 0.1},
    {name: 'eval_max_tokens', label: 'Eval Max Tokens', type: 'number', min: 1, max: 100, step: 1},
];

function buildForm(config) {
    var html = '';
    var currentSection = '';
    for (var i = 0; i < FIELDS.length; i++) {
        var f = FIELDS[i];
        if (f.section) {
            if (currentSection) html += '</div>';
            currentSection = f.section;
            html += '<div class="section"><h3>' + esc(f.section) + '</h3>';
            continue;
        }
        var val = config[f.name] !== undefined ? config[f.name] : '';
        var id = 'cfg-' + f.name;

        if (f.type === 'checkbox') {
            var checked = val ? ' checked' : '';
            html += '<div class="field"><label>' + esc(f.label) + '</label><input type="checkbox" id="' + id + '"' + checked + '></div>';
        } else if (f.type === 'select') {
            var opts = '';
            for (var j = 0; j < f.options.length; j++) {
                var sel = (''+val) === f.options[j] ? ' selected' : '';
                opts += '<option value="' + esc(f.options[j]) + '"' + sel + '>' + esc(f.options[j]) + '</option>';
            }
            html += '<div class="field"><label>' + esc(f.label) + (f.unit ? ' <small>(' + esc(f.unit) + ')</small>' : '') + '</label><select id="' + id + '">' + opts + '</select></div>';
        } else {
            var attrs = 'type="number"';
            if (f.min !== undefined) attrs += ' min="' + f.min + '"';
            if (f.max !== undefined) attrs += ' max="' + f.max + '"';
            if (f.step !== undefined) attrs += ' step="' + f.step + '"';
            html += '<div class="field"><label>' + esc(f.label) + (f.unit ? ' <small>(' + esc(f.unit) + ')</small>' : '') + '</label><input ' + attrs + ' id="' + id + '" value="' + esc(''+val) + '"></div>';
        }
    }
    if (currentSection) html += '</div>';
    html += '<div class="section"><h3>Info</h3>';
    if (config._param_estimate) {
        var p = config._param_estimate;
        var label = p >= 1000000 ? (p/1e6).toFixed(1) + 'M' : p >= 1000 ? (p/1e3).toFixed(0) + 'K' : '' + p;
        html += '<div class="field"><label>Estimated Parameters</label><span class="val">' + label + '</span></div>';
    }
    if (config._vocab_size) {
        html += '<div class="field"><label>Vocabulary Size</label><span class="val">' + config._vocab_size + '</span></div>';
    }
    html += '</div>';

    $('config-form').innerHTML = html;
}

function getFormValues() {
    var vals = {};
    for (var i = 0; i < FIELDS.length; i++) {
        var f = FIELDS[i];
        if (f.section) continue;
        var el = document.getElementById('cfg-' + f.name);
        if (!el) continue;
        if (f.type === 'checkbox') {
            vals[f.name] = el.checked;
        } else if (f.type === 'select') {
            vals[f.name] = el.value;
        } else {
            var num = parseFloat(el.value);
            if (f.step !== undefined && f.step < 1) {
                vals[f.name] = num;
            } else if (f.step !== undefined && f.step >= 1) {
                vals[f.name] = Math.round(num);
            } else {
                vals[f.name] = num % 1 === 0 ? Math.round(num) : num;
            }
        }
    }
    return vals;
}

async function loadConfig() {
    var st = $('status');
    st.innerHTML = '&#x1F504; Loading...';
    st.className = '';
    $('save-btn').disabled = true;
    try {
        var r = await fetch(API + '/api/config');
        var d = await r.json();
        origConfig = d;
        buildForm(d);
        st.innerHTML = '&#x2705; Config loaded. ' + Object.keys(d).length + ' parameters.';
        st.className = 'ok';
        $('save-btn').disabled = false;
    } catch(e) {
        st.innerHTML = '&#x26A0; Error: ' + esc(e.message);
        st.className = 'err';
        // Build with defaults
        buildForm({
            d_model: 128, n_layers: 4, n_heads: 4, d_ff: 512, max_seq_len: 32, dropout: 0.1,
            activation: 'swiglu', norm_type: 'rmsnorm', pos_encoding: 'rope', weight_init: 'normal', init_std: 0.02,
            batch_size: 256, learning_rate: 0.0005, weight_decay: 0.01, warmup_steps: 500, max_steps: 50000,
            optimizer: 'adamw', lr_schedule: 'cosine', grad_clip_norm: 1.0, label_smoothing: 0.0,
            train_samples: 100000, eval_samples: 100, min_digits: 1, max_digits: 1,
            use_reversed: true, use_loss_masking: true, use_hard_negative: true, tie_embeddings: false,
            eval_temperature: 0.0, eval_max_tokens: 20
        });
    }
}

async function saveConfig() {
    var st = $('status');
    var vals = getFormValues();
    st.innerHTML = '&#x1F504; Saving...';
    st.className = '';
    $('save-btn').disabled = true;
    try {
        var r = await fetch(API + '/api/config', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(vals)
        });
        var d = await r.json();
        if (d.status === 'saved') {
            st.innerHTML = '&#x2705; Saved! ' + (d.changes ? d.changes.length + ' changes.' : '');
            st.className = 'ok';
            if (d.changes && d.changes.length) {
                var ch = '<ul class="changes">';
                for (var i = 0; i < d.changes.length; i++) ch += '<li>' + esc(d.changes[i]) + '</li>';
                ch += '</ul>';
                st.innerHTML += ch;
            }
        } else {
            st.innerHTML = '&#x26A0; ' + esc(d.error || 'Unknown error');
            st.className = 'err';
        }
    } catch(e) {
        st.innerHTML = '&#x26A0; Error: ' + esc(e.message);
        st.className = 'err';
    }
    $('save-btn').disabled = false;
}

loadConfig();
</script>
</body>
</html>
