name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - run: ruff check src/tabula_rasa/ tests/
      - run: mypy src/tabula_rasa/ --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + deps
        run: |
          python -m venv /tmp/venv
          source /tmp/venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage (core packages)
        run: |
          source /tmp/venv/bin/activate
          python -m pytest tests/ -v --tb=short \
              --cov=tabula_rasa.config \
              --cov=tabula_rasa.model \
              --cov=tabula_rasa.tokenizer \
              --cov=tabula_rasa.dataset \
              --cov=tabula_rasa.eval \
              --cov=tabula_rasa.rope \
              --cov=tabula_rasa.norms \
              --cov=tabula_rasa.attention \
              --cov=tabula_rasa.ffn \
              --cov=tabula_rasa.transformer_block \
              --cov=tabula_rasa.experiments \
              --cov=tabula_rasa.generate \
              --cov=tabula_rasa.lora \
              --cov=tabula_rasa.training.mult_scratchpad \
              --cov-fail-under=70 -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage
          include-hidden-files: true
