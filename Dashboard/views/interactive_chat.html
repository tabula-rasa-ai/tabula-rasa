<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Chat — Tabula Rasa</title>
    <style>
        :root { --bg: #111827; --panel: #1f2937; --border: #374151; --text: #f3f4f6; --accent: #3b82f6; --sidebar: 260px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
        .sidebar { width: var(--sidebar); background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-hdr { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-hdr h2 { font-size: 0.95rem; }
        .sidebar-hdr button { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .sidebar-hdr button:hover { background: #2563eb; }
        .session-list { flex: 1; overflow-y: auto; padding: 6px 0; }
        .session-item { padding: 10px 16px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; }
        .session-item:hover { background: rgba(59,130,246,0.08); }
        .session-item.active { background: rgba(59,130,246,0.15); border-left: 3px solid var(--accent); }
        .session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-item .del { opacity: 0; color: #ef4444; cursor: pointer; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; }
        .session-item:hover .del { opacity: 1; }
        .session-item .del:hover { background: rgba(239,68,68,0.2); }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; max-width: 800px; }
        .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .hdr .l { display: flex; align-items: center; gap: 10px; }
        .hdr .l .ic { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .hdr .l h1 { font-size: 1.1rem; }
        .hdr .l small { font-size: 0.7rem; color: #9ca3af; }
        .hdr .r { font-size: 0.75rem; color: #9ca3af; text-align: right; min-width: 120px; }
        .hdr .r strong { color: white; }
        .hdr .r .corr-num { color: #facc15; font-weight: bold; }
        .chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; padding-right: 6px; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.ai { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .av { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
        .msg.user .av { background: #4b5563; }
        .msg .bub { background: var(--panel); border: 1px solid var(--border); padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
        .msg.user .bub { background: var(--accent); border-color: var(--accent); color: white; }
        .msg .meta { font-size: 0.7rem; color: #6b7280; margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
        .msg .meta .tag { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
        .msg .meta .tag.skill { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .msg .meta .tag.correct { background: rgba(34,197,94,0.15); color: #22c55e; }
        .msg .meta .tag.wrong { background: rgba(239,68,68,0.15); color: #ef4444; }
        .msg .meta .tag.needs { background: rgba(250,204,21,0.15); color: #facc15; }
        .unknown-box { background: rgba(250,204,21,0.08); border-left: 3px solid #facc15; padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 4px 0; font-size: 0.85rem; color: #d1d5db; }
        .chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; flex-wrap: wrap; }
        .chips button { background: var(--panel); border: 1px solid var(--border); color: #d1d5db; padding: 5px 12px; border-radius: 16px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .chips button:hover { border-color: var(--accent); color: white; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-row input { flex: 1; background: var(--panel); border: 1px solid var(--border); color: white; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; outline: none; }
        .input-row input:focus { border-color: var(--accent); }
        .input-row button { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .input-row button:hover { background: #2563eb; }
        .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
        .at { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.8rem; color: #9ca3af; user-select: none; flex-shrink: 0; }
        .at .tk { width: 36px; height: 20px; border-radius: 10px; background: #374151; position: relative; transition: background .2s; }
        .at .tk.on { background: var(--accent); }
        .at .tk .kb { width: 16px; height: 16px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: left .2s; }
        .at .tk.on .kb { left: 18px; }
        .status { font-size: 0.75rem; color: #6b7280; min-height: 18px; margin-top: 6px; }
        .notif { position: fixed; top: 16px; right: 16px; background: var(--panel); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; font-size: 0.8rem; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .notif.show { opacity: 1; }
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #4b5563; font-size: 0.9rem; text-align: center; padding: 40px; }
        .empty-state p { max-width: 300px; line-height: 1.6; }
        .ds-bar { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin: 4px 0; background: #1f2937; border-radius: 6px; cursor: pointer; font-size: 0.8rem; user-select: none; border: 1px solid #374151; }
        .ds-bar:hover { border-color: #3b82f6; }
        .ds-panel { overflow: hidden; max-height: 0; transition: max-height .3s ease; background: #1f2937; border-radius: 6px; margin-bottom: 6px; border: 1px solid #374151; }
        .ds-panel.open { max-height: 400px; overflow-y: auto; }
        .ds-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 0.78rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .ds-item:last-child { border-bottom: none; }
        .ds-item .ds-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ds-item .ds-pairs { color: #9ca3af; min-width: 50px; text-align: right; }
        .ds-item .ds-status { min-width: 16px; }
    </style>
</head>
<body>
    <div class="notif" id="notif"></div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-hdr">
            <h2>&#x1F4AC; Sessions</h2>
            <div style="display:flex;gap:4px;">
                <button onclick="exportChat()" title="Export all sessions">&#x1F4E4;</button>
                <button onclick="newSession()">+ New</button>
            </div>
        </div>
        <div class="session-list" id="session-list"></div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="hdr">
            <div class="l"><div class="ic">&#x1F9E0;</div><div><h1>Tabula Rasa <small>V1.3</small></h1><small id="session-name">Current session</small></div></div>
            <div class="r">
                Known: <strong id="known-c">0</strong><br>
                Learning: <strong id="queued-c">0</strong><br>
                Corrections: <span class="corr-num" id="corr-c">0</span>
            </div>
        </div>

        <div class="ds-bar" id="ds-bar" onclick="toggleDatasets()">
            <span>&#x1F4CB; Datasets</span>
            <span id="ds-summary" style="color:#9ca3af;font-size:0.75rem;">loading...</span>
            <span id="ds-arrow" style="color:#6b7280;font-size:0.75rem;">&#x25BC;</span>
        </div>
        <div class="ds-panel" id="ds-panel"></div>

        <div class="chat" id="chat"></div>

        <div class="chips">
            <button onclick="ask('12+34=')">12+34=</button>
            <button onclick="ask('5+7=')">5+7=</button>
            <button onclick="ask('99+1=')">99+1=</button>
            <button onclick="ask('hello')">Hello</button>
            <button onclick="ask('What can you do?')">What can you do?</button>
        </div>

        <div class="input-row">
            <div class="at" onclick="toggleAT()"><div class="tk" id="atk"><div class="kb"></div></div> Auto-Teach</div>
            <input type="text" id="inp" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button id="ask-btn" onclick="sendMsg()">Ask</button>
        </div>
        <div class="status" id="status"></div>
        <div id="train-status" style="font-size:0.75rem;color:#6b7280;min-height:18px;margin-top:2px;"></div>
    </div>

    <script>
    var API2 = (window.location.port === '8000' || window.location.port === '8002')
        ? 'http://localhost:8002' : window.location.protocol + '//' + window.location.hostname + ':' + window.location.port;
    var API1 = API2;
    var autoTeach = false, busy = false, totalCorrections = 0;
    var currentSessionId = null;

    // ─── Session Storage ───
    function getSessions() {
        try { return JSON.parse(localStorage.getItem('tr_sessions')) || {}; } catch(e) { return {}; }
    }
    function saveSessions(s) {
        localStorage.setItem('tr_sessions', JSON.stringify(s));
    }
    function getSession(id) {
        var all = getSessions();
        return all[id] || null;
    }
    function putSession(id, data) {
        var all = getSessions();
        all[id] = data;
        saveSessions(all);
    }
    function delSession(id) {
        var all = getSessions();
        delete all[id];
        saveSessions(all);
    }
    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

    function newSession() {
        var id = genId();
        var data = { id: id, name: 'Session ' + Object.keys(getSessions()).length, messages: [], created: Date.now() };
        putSession(id, data);
        switchSession(id);
        renderSidebar();
    }

    function switchSession(id) {
        currentSessionId = id;
        renderSidebar();
        renderChat();
    }

    function deleteSesh(id) {
        if (!confirm('Delete this session?')) return;
        delSession(id);
        var all = getSessions();
        var keys = Object.keys(all);
        if (keys.length === 0) {
            newSession();
        } else {
            switchSession(keys[keys.length - 1]);
        }
        renderSidebar();
    }

    function addMsgToSession(sessionId, role, content, meta) {
        var s = getSession(sessionId);
        if (!s) return;
        if (!s.messages) s.messages = [];
        s.messages.push({ role: role, content: content, meta: meta || '', ts: Date.now() });
        // Update name from first user message
        if (s.messages.length === 1 && role === 'user') {
            s.name = content.slice(0, 40) + (content.length > 40 ? '...' : '');
        }
        putSession(sessionId, s);
        renderSidebar();
    }

    // ─── Rendering ───
    function renderSidebar() {
        var list = document.getElementById('session-list');
        var all = getSessions();
        var keys = Object.keys(all);
        if (keys.length === 0) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#4b5563;font-size:0.8rem;">No sessions yet.<br>Click + New to start.</div>';
            return;
        }
        var html = '';
        // Sort by most recent message
        keys.sort(function(a, b) {
            var ma = (all[a].messages && all[a].messages.length) ? all[a].messages[all[a].messages.length - 1].ts : all[a].created;
            var mb = (all[b].messages && all[b].messages.length) ? all[b].messages[all[b].messages.length - 1].ts : all[b].created;
            return mb - ma;
        });
        for (var i = 0; i < keys.length; i++) {
            var s = all[keys[i]];
            var active = keys[i] === currentSessionId ? ' active' : '';
            var msgCount = (s.messages || []).length;
            html += '<div class="session-item' + active + '" onclick="switchSession(\'' + keys[i] + '\')">'
                 + '<div class="name">' + esc(s.name || 'Untitled') + ' <span style="color:#6b7280;font-size:0.7rem;">' + Math.ceil(msgCount/2) + ' msgs</span></div>'
                 + '<div style="display:flex;gap:2px;">'
                 + '<span class="del" style="opacity:0.5;font-size:0.75rem;" onclick="event.stopPropagation();exportOne(\'' + keys[i] + '\')" title="Export this session">&#x1F4E4;</span>'
                 + '<span class="del" onclick="event.stopPropagation();deleteSesh(\'' + keys[i] + '\')">&#x2716;</span>'
                 + '</div>'
                 + '</div>';
        }
        list.innerHTML = html;
    }

    function renderChat() {
        var chat = document.getElementById('chat');
        var s = getSession(currentSessionId);
        if (!s || !s.messages || s.messages.length === 0) {
            chat.innerHTML = '<div class="empty-state"><p>Ask a question to start the conversation.<br>The AI learns from scratch — every skill must be trained.</p></div>';
            document.getElementById('session-name').textContent = s ? esc(s.name) : '';
            return;
        }
        document.getElementById('session-name').textContent = esc(s.name);
        var html = '';
        for (var i = 0; i < s.messages.length; i++) {
            var m = s.messages[i];
            if (m.role === 'user') {
                html += '<div class="msg user"><div class="av">&#x1F464;</div><div class="bub">' + esc(m.content) + '</div></div>';
            } else {
                html += '<div class="msg ai"><div class="av">&#x1F9E0;</div><div class="bub">' + m.content + (m.meta ? '<div class="meta">' + m.meta + '</div>' : '') + '</div></div>';
            }
        }
        chat.innerHTML = html;
        chat.scrollTop = chat.scrollHeight;
    }

    function $(id) { return document.getElementById(id); }
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function notify(msg, color) {
        var n = $('notif');
        n.textContent = msg;
        n.style.borderColor = color || '#374151';
        n.className = 'notif show';
        setTimeout(function() { n.className = 'notif'; }, 2000);
    }

    function addBubble(role, content, meta) {
        var chat = $('chat');
        // Remove empty state
        var emp = chat.querySelector('.empty-state');
        if (emp) emp.remove();
        if (role === 'user') {
            chat.insertAdjacentHTML('beforeend', '<div class="msg user"><div class="av">&#x1F464;</div><div class="bub">' + content + '</div></div>');
        } else {
            chat.insertAdjacentHTML('beforeend', '<div class="msg ai"><div class="av">&#x1F9E0;</div><div class="bub">' + content + (meta ? '<div class="meta">' + meta + '</div>' : '') + '</div></div>');
        }
        chat.scrollTop = chat.scrollHeight;
    }

    // ─── API Calls ───
    function isMath(prompt) {
        return /^\d+\s*[+\-*/]\s*\d+\s*=\s*$|^\d+\s*[+\-*/]\s*\d+$/.test(prompt.trim());
    }

    async function askMath(prompt) {
        // Try the math lookup server first, fall back to the API server
        try {
            var r = await fetch('http://localhost:8084/compute', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            if (r.ok) return await r.json();
        } catch(e) {
            // Lookup server unavailable — fall through to API server
        }
        // Fallback: use the API server's /generate endpoint
        var r = await fetch(API1 + '/generate', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt, temperature: 0.0, top_k: 3 })
        });
        return await r.json();
    }

    function parseScratchpad(raw) {
        if (!raw || raw.length < 2) return raw;
        var digits = '', carries = '';
        for (var i = 0; i < raw.length; i += 2) {
            carries += raw[i];
            digits += raw[i + 1] || '';
        }
        var normal = digits.split('').reverse().join('');
        if (carries && carries[carries.length - 1] === '1') normal = '1' + normal;
        return normal.replace(/^0+/, '') || '0';
    }

    async function sendCorrect(prompt, correctAnswer) {
        try {
            var r = await fetch(API1 + '/correct', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt, answer: correctAnswer })
            });
            var d = await r.json();
            if (d.status === 'ok') {
                totalCorrections++;
                $('corr-c').textContent = totalCorrections;
                notify('Learned: ' + prompt + correctAnswer, '#22c55e');
            }
        } catch(e) {}
    }

    async function ask(prompt) {
        if (busy) return;
        if (!prompt || !prompt.trim()) return;
        // Ensure we have a session
        if (!currentSessionId) newSession();
        if (!currentSessionId) return;

        busy = true;
        $('ask-btn').disabled = true;

        addBubble('user', esc(prompt));
        addMsgToSession(currentSessionId, 'user', prompt, '');

        $('inp').value = '';
        $('status').textContent = 'Thinking...';
        var cid = 'r' + Date.now();
        addBubble('ai', '<span id="' + cid + '" style="color: #6b7280;">...</span>', '<span style="color:#6b7280;">computing...</span>');

        if (isMath(prompt)) {
            try {
                var d = await askMath(prompt);
                var el = $(cid);
                if (!el) { busy = false; $('ask-btn').disabled = false; return; }

                var show = '';
                if (d.display) {
                    show = d.display;
                } else {
                    var raw = d.result || '';
                    if (raw.includes('=')) raw = raw.split('=').pop().replace(/<[^>]+>/g, '').trim();
                    show = (raw && raw.length >= 2 && raw.includes('<')) ? parseScratchpad(raw) : raw;
                }
                el.textContent = show || '(no answer)';
                el.style.cssText = 'color:white;font-size:1.1rem;font-weight:bold';

                var meta = '<span>' + (d.time_ms || '?') + 'ms</span><span class="tag skill">math specialist</span>';
                if (d.display && d.result) {
                    var rawPart = d.result.split('=').pop().replace(/<[^>]+>/g, '').trim();
                    if (rawPart && d.display !== rawPart) meta += '<span class="tag scratchpad">scratchpad</span>';
                }
                el.nextElementSibling.innerHTML = meta;
                $('status').textContent = 'Answered.';
                addMsgToSession(currentSessionId, 'ai', show || '(no answer)', meta);

                if (autoTeach) {
                    var expr = prompt.replace(/=\s*$/, '').trim();
                    try {
                        var correctAns = Function('"use strict"; return (' + expr + ')')();
                        var userAns = parseInt(show);
                        if (!isNaN(correctAns) && !isNaN(userAns) && correctAns !== userAns) {
                            $('status').textContent = 'Wrong. Auto-teaching correct answer...';
                            await sendCorrect(expr, String(correctAns));
                        }
                    } catch(calcErr) {}
                }
            } catch(e2) {
                var el = $(cid);
                if (el) {
                    el.innerHTML = '<span style="color:#ef4444;">I don&#39;t know about that yet.</span><div class="unknown-box">No specialist trained for this topic.</div>';
                    el.style.cssText = '';
                }
                $('status').textContent = 'Server offline.';
                addMsgToSession(currentSessionId, 'ai', 'I don\'t know about that yet.', '<span class="tag needs">No specialist</span>');
            }
            busy = false; $('ask-btn').disabled = false; return;
        }

        // Non-math: try AI
        try {
            var r = await fetch(API2 + '/ask', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: prompt, temperature: 0.0, top_k: 3, skill: '' })
            });
            var d = await r.json();
            var el = $(cid);
            if (!el) { busy = false; $('ask-btn').disabled = false; return; }

            if (d.knows && d.answer) {
                var ans = d.answer.replace(/<[^>]+>/g, '').trim();
                if (ans.includes('=') && d.skill) {
                    var parts = ans.split('=');
                    ans = parts.slice(1).join('=').trim();
                    if (!ans) ans = parts[0];
                }
                el.textContent = ans;
                el.style.cssText = 'color:white;font-size:1.1rem;font-weight:bold';
                var meta = '';
                if (d.skill) meta += '<span class="tag skill">&#x1F9ED; ' + esc(d.skill) + '</span>';
                if (d.confidence !== null && d.confidence !== undefined) {
                    var p = d.confidence;
                    var col = p >= 80 ? '#22c55e' : p >= 50 ? '#facc15' : '#ef4444';
                    meta += '<span style="color:' + col + ';">&#x' + (p >= 80 ? '2705' : '26A0') + '; ' + p + '%</span>';
                }
                meta += '<span>' + (d.time_ms || '?') + 'ms</span>';
                if (d.training_info) {
                    var ti = d.training_info;
                    meta += '<span class="tag" style="background:rgba(168,85,247,0.15);color:#a855f7;">Lv' + ti.level + ' d=' + ti.d_model + ' st=' + ti.steps + '</span>';
                    if (ti.params) meta += '<span class="tag" style="background:rgba(59,130,246,0.12);color:#60a5fa;">' + (ti.params/1000).toFixed(0) + 'K</span>';
                    if (ti.creativity !== undefined) meta += '<span class="tag" style="background:rgba(34,197,94,0.12);color:#22c55e;">🎨 ' + ti.creativity + '%</span>';
                }
                el.nextElementSibling.innerHTML = meta;
                $('status').textContent = d.is_confident ? 'Answered.' : 'Answered (low confidence).';
                addMsgToSession(currentSessionId, 'ai', ans, meta);
            } else if (d.status === 'training') {
                // Training in progress
                el.innerHTML = '<span style="color:#3b82f6;font-weight:bold;">&#x1F9E0; ' + esc(d.message || 'Training...') + '</span>';
                el.style.cssText = '';
                el.nextElementSibling.innerHTML = '<span class="tag" style="background:rgba(59,130,246,0.15);color:#60a5fa;">training</span>';
                $('status').textContent = d.message || 'Training...';
                addMsgToSession(currentSessionId, 'ai', d.message || 'Training...', '<span class="tag">training</span>');
            } else {
                el.innerHTML = '';
                el.style.cssText = '';
                var html = '<span style="color:#facc15;font-weight:bold;">I don\'t know about that yet.</span>';
                if (d.suggested_skills && d.suggested_skills.length) {
                    html += '<div class="unknown-box">To answer this I would need: <strong>' + esc(d.suggested_skills.join(', ')) + '</strong>.</div>';
                } else if (d.analysis) {
                    html += '<div class="unknown-box">' + esc(d.analysis) + '</div>';
                }
                el.insertAdjacentHTML('afterbegin', html);
                var meta = '';
                if (d.suggested_skills && d.suggested_skills.length) {
                    meta += '<span class="tag needs">Needs: ' + esc(d.suggested_skills.join(', ')) + '</span>';
                }
                el.nextElementSibling.innerHTML = meta;
                $('status').textContent = d.message || 'Unknown.';
                addMsgToSession(currentSessionId, 'ai', html, meta);
            }
        } catch(e) {
            try {
                var r = await fetch(API1 + '/generate', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, temperature: 0.0, top_k: 3 })
                });
                var d = await r.json();
                var el = $(cid);
                if (!el) { busy = false; $('ask-btn').disabled = false; return; }
                var show = d.display || (d.result || '').split('=').pop().replace(/<[^>]+>/g, '').trim() || '';
                el.textContent = show || '(no answer)';
                el.style.cssText = 'color:white;font-size:1.1rem;font-weight:bold';
                var meta = '<span>' + (d.time_ms || '?') + 'ms</span><span class="tag skill">math specialist</span>';
                el.nextElementSibling.innerHTML = meta;
                $('status').textContent = 'Answered.';
                addMsgToSession(currentSessionId, 'ai', show || '(no answer)', meta);

                if (autoTeach && isMath(prompt)) {
                    var expr = prompt.replace(/=\s*$/, '').trim();
                    try {
                        var correctAns = Function('"use strict"; return (' + expr + ')')();
                        var userAns = parseInt(show);
                        if (!isNaN(correctAns) && !isNaN(userAns) && correctAns !== userAns) {
                            $('status').textContent = 'Wrong. Auto-teaching correct answer...';
                            await sendCorrect(expr, String(correctAns));
                        }
                    } catch(calcErr) {}
                }
            } catch(e2) {
                var el = $(cid);
                if (el) {
                    el.innerHTML = '<span style="color:#ef4444;">Server offline.</span>';
                    el.style.cssText = '';
                }
                $('status').textContent = 'Server offline.';
                addMsgToSession(currentSessionId, 'ai', 'Server offline.', '');
            }
        }

        busy = false;
        $('ask-btn').disabled = false;
    }

    function sendMsg() {
        var inp = $('inp');
        if (inp.value.trim()) ask(inp.value);
        inp.value = '';
    }

    function toggleAT() {
        autoTeach = !autoTeach;
        $('atk').className = 'tk' + (autoTeach ? ' on' : '');
        notify(autoTeach ? 'Auto-Teach ON' : 'Auto-Teach OFF', autoTeach ? '#3b82f6' : '#6b7280');
    }

    function exportChat() {
        var data = getSessions();
        var text = JSON.stringify(data, null, 2);
        copyText(text, 'All sessions copied to clipboard!');
    }

    function exportOne(id) {
        var s = getSession(id);
        if (!s) { notify('Session not found', '#ef4444'); return; }
        var text = JSON.stringify(s, null, 2);
        copyText(text, 'Session "' + (s.name || 'Untitled') + '" copied to clipboard!');
    }

    function copyText(text, msg) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                notify(msg, '#22c55e');
            }).catch(function() {
                fallbackCopy(text, msg);
            });
        } else {
            fallbackCopy(text, msg);
        }
    }

    function fallbackCopy(text, msg) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); notify(msg, '#22c55e'); }
        catch(e) { notify('Copy failed. Use browser dev tools to copy localStorage.tr_sessions', '#ef4444'); }
        document.body.removeChild(ta);
    }

    async function pollSkills() {
        try {
            var r = await fetch(API2 + '/skills');
            var d = await r.json();
            var skills = d.skills || [];
            var known = skills.filter(function(s) { return s.status === 'ready'; });
            var queued = skills.filter(function(s) { return s.status === 'queued' || s.status === 'training'; });
            $('known-c').textContent = known.length;
            $('queued-c').textContent = queued.length;
        } catch(e) {}
    }
    pollSkills();
    setInterval(pollSkills, 15000);

    // ─── Training progress polling ───
    async function pollTraining() {
        try {
            var r = await fetch(API2 + '/training-progress');
            var d = await r.json();
            var prog = d.training || {};
            var keys = Object.keys(prog);
            var el = document.getElementById('train-status');
            if (keys.length === 0) { el.textContent = ''; return; }
            // Auto-open datasets panel when training starts
            if (!dsOpen) {
                dsOpen = true;
                document.getElementById('ds-panel').className = 'ds-panel open';
                document.getElementById('ds-arrow').innerHTML = '&#x25B2;';
                pollDatasets();
            }
            var parts = [];
            for (var i = 0; i < keys.length; i++) {
                var p = prog[keys[i]];
                if (p.status === 'done') continue;
                if (p.status === 'training') {
                    var pct = Math.round(p.step / p.total * 100);
                    var sps = '';
                    var eta = '';
                    if (p.t0 && p.step > 0) {
                        var elapsed = (Date.now() - p.t0 * 1000) / 1000;
                        if (elapsed > 0) {
                            var rate = p.step / elapsed;
                            sps = ' ' + rate.toFixed(1) + ' st/s';
                            var rem = (p.total - p.step) / rate;
                            if (rem < 60) eta = ' ' + Math.round(rem) + 's';
                            else eta = ' ' + Math.floor(rem/60) + 'm ' + Math.round(rem%60) + 's';
                        }
                    }
                    parts.push('Training ' + keys[i] + ': ' + p.step + '/' + p.total + ' (' + pct + '%) loss=' + p.loss + sps + eta + ' CPU' + (p.cpu || '?'));
                } else if (p.status === 'starting') {
                    parts.push('Starting ' + keys[i] + ' training...');
                } else if (p.status === 'saving') {
                    parts.push('Saving ' + keys[i] + ' specialist...');
                }
            }
            el.textContent = parts.join(' | ');
        } catch(e) {}
    }
    setInterval(pollTraining, 2000);

    // ─── Datasets panel ───
    var dsOpen = false;
    function toggleDatasets() {
        dsOpen = !dsOpen;
        document.getElementById('ds-panel').className = 'ds-panel' + (dsOpen ? ' open' : '');
        document.getElementById('ds-arrow').innerHTML = dsOpen ? '&#x25B2;' : '&#x25BC;';
        if (dsOpen) pollDatasets();
    }
    async function pollDatasets() {
        try {
            var r = await fetch(API2 + '/datasets');
            var d = await r.json();
            var datasets = d.datasets || {};
            var keys = Object.keys(datasets);
            var total = keys.length;
            var trained = keys.filter(function(k) { return datasets[k].trained; }).length;
            var training = keys.filter(function(k) { return datasets[k].training; }).length;
            var totalPairs = keys.reduce(function(s, k) { return s + (datasets[k].pairs || 0); }, 0);
            document.getElementById('ds-summary').textContent = total + ' files, ' + totalPairs + ' pairs, ' + trained + ' ready' + (training ? ', ' + training + ' training' : '');
            // Render panel
            var html = '';
            keys.sort();
            for (var i = 0; i < keys.length; i++) {
                var ds = datasets[keys[i]];
                var icon = ds.trained ? '&#x2705;' : (ds.training ? '&#x1F504;' : (ds.has_real_answers ? '&#x1F4D6;' : '&#x1F4C4;'));
                var statusText = ds.trained ? 'ready' : (ds.training ? 'training...' : (ds.has_real_answers ? ds.pairs + ' pairs' : 'new'));
                html += '<div class="ds-item">'
                     + '<span class="ds-status">' + icon + '</span>'
                     + '<span class="ds-name">' + keys[i] + '</span>'
                     + '<span class="ds-pairs">' + ds.pairs + ' pr' + (ds.params > 0 ? ' | ' + Math.round(ds.params/1000) + 'K' : '') + '</span>'
                     + '<span style="color:' + (ds.trained ? '#22c55e' : (ds.training ? '#3b82f6' : '#9ca3af')) + ';font-size:0.7rem;">' + statusText + '</span>'
                     + '</div>';
            }
            document.getElementById('ds-panel').innerHTML = html;
        } catch(e) { document.getElementById('ds-summary').textContent = 'offline'; }
    }
    pollDatasets();
    setInterval(pollDatasets, 10000);

    // ─── Init ───
    // Load existing sessions or create first
    var sessions = getSessions();
    var keys = Object.keys(sessions);
    if (keys.length > 0) {
        switchSession(keys[keys.length - 1]);
    } else {
        newSession();
    }
    renderSidebar();
    </script>
</body>
</html>
